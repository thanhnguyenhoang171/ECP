
# MySQL - Kết nối đến database local của bạn
spring.datasource.url=jdbc:mysql://localhost:3306/ecp_local?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=142857

# HikariCP Connection Pool - Local/Dev (smaller pool)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.register-mbeans=true

# JPA/Hibernate - Tự động tạo bảng ở local để tiện phát triển
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MongoDB - Kết nối đến mongo local
spring.data.mongodb.uri=mongodb://localhost:27017/ecp_mongo

# JWT - Key cố định ở máy local để không phải cấu hình env
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration=3600000
app.jwt.refresh-expiration=86400000


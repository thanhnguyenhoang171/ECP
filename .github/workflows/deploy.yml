name: ECP CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  REGISTRY: ghcr.io

jobs:
  # ==========================================
  # JOB 1: KIỂM TRA CHẤT LƯỢNG CODE & BUILD
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint Code
        run: pnpm turbo lint

      - name: Build All Apps (Frontend & Backend)
        run: pnpm turbo build

  # ==========================================
  # JOB 2: BUILD DOCKER & PUSH LÊN GHCR
  # ==========================================
  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: admin
            context: .
            dockerfile: ./apps/admin/Dockerfile
            image: ghcr.io/${{ github.repository }}/ecp-admin
          - name: storefront
            context: .
            dockerfile: ./apps/storefront/Dockerfile
            image: ghcr.io/${{ github.repository }}/ecp-storefront
          - name: api
            context: ./services/ecp_api
            dockerfile: ./services/ecp_api/Dockerfile
            image: ghcr.io/${{ github.repository }}/ecp-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false # Quan trọng: Tắt cái này để sửa lỗi 'unknown blob'

  # ==========================================
  # JOB 3: DEPLOY TRỰC TIẾP VỀ LAPTOP ASUS
  # ==========================================
  deploy-to-laptop:
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Deploy via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          # Secrets cho Backend
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          SPRING_MONGODB_URI: ${{ secrets.SPRING_MONGODB_URI }}
          # Secrets cho Database (Khởi tạo)
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MONGO_ROOT_USER: ${{ secrets.MONGO_ROOT_USER }}
          MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
          # Secrets cho Frontend
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          # 1. Thiết lập thư mục SSH và lưu Private Key
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa_ecp
          chmod 600 ~/.ssh/id_rsa_ecp

          # 2. Tạo file config SSH để ép dùng Cloudflared làm Proxy
          cat <<EOF > ~/.ssh/config
          Host asus-server
              HostName $SERVER_HOST
              User $SERVER_USER
              IdentityFile ~/.ssh/id_rsa_ecp
              ProxyCommand cloudflared access ssh --hostname %h
              StrictHostKeyChecking no
          EOF

          # 2.5 Copy file docker-compose.yml mới nhất lên server
          scp docker-compose.yml asus-server:~/ECP/docker-compose.yml

          # 3. Chạy lệnh deploy từ xa qua SSH và tạo file .env động
          ssh asus-server << ENDSSH
          cd ~/ECP

          # Tạo hoặc ghi đè file .env để docker-compose bốc biến
          echo "SPRING_DATASOURCE_URL=$SPRING_DATASOURCE_URL" > .env
          echo "SPRING_DATASOURCE_USERNAME=$SPRING_DATASOURCE_USERNAME" >> .env
          echo "SPRING_DATASOURCE_PASSWORD=$SPRING_DATASOURCE_PASSWORD" >> .env
          echo "SPRING_MONGODB_URI=$SPRING_MONGODB_URI" >> .env
          echo "MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD" >> .env
          echo "MYSQL_DATABASE=$MYSQL_DATABASE" >> .env
          echo "MYSQL_USER=$MYSQL_USER" >> .env
          echo "MYSQL_PASSWORD=$MYSQL_PASSWORD" >> .env
          echo "MONGO_ROOT_USER=$MONGO_ROOT_USER" >> .env
          echo "MONGO_ROOT_PASSWORD=$MONGO_ROOT_PASSWORD" >> .env
          echo "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL" >> .env

          # Đăng nhập để có quyền kéo image private
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          # 1. Kéo bản mới nhất về
          docker compose pull

          # 2. Ép Docker tạo lại Container từ Image mới
          docker compose up -d --force-recreate --remove-orphans

          # 3. Dọn dẹp các Image cũ bị "treo"
          docker image prune -f
          ENDSSH